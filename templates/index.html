<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>P&ID Diagram Extraction</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 24px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-bottom: 8px;
        }

        p {
            color: #555;
        }

        form {
            margin-top: 20px;
            padding: 16px;
            border: 1px solid #eee;
            border-radius: 8px;
            background: #fafafa;
        }

        .file-upload {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .file-upload input[type="file"] {
            display: none;
        }

        .button-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .action-btn {
            min-width: 190px;
            height: 44px;
            padding: 0 16px;
            border: none;
            border-radius: 8px;
            background: #16a34a;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-sizing: border-box;
            text-decoration: none;
        }

        .action-btn:hover {
            background: #15803d;
        }

        .primary-btn {
            min-width: 190px;
            height: 44px;
            padding: 0 16px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-sizing: border-box;
        }

        .primary-btn:hover {
            background: #1e4fd8;
        }

        .file-name {
            color: #555;
            font-size: 14px;
        }

        .progress-wrapper {
            display: none;
            margin-top: 18px;
        }

        .progress-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            gap: 12px;
        }

        .progress-label {
            font-size: 14px;
            color: #444;
            font-weight: 500;
        }

        .progress-status {
            font-size: 13px;
            color: #666;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: #e5e7eb;
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-fill {
            width: 35%;
            height: 100%;
            background: linear-gradient(90deg, #2563eb, #60a5fa);
            border-radius: 999px;
            animation: loading 1.2s infinite ease-in-out;
        }

        @keyframes loading {
            0% {
                margin-left: -35%;
            }

            100% {
                margin-left: 100%;
            }
        }

        .progress-note {
            margin-top: 8px;
            font-size: 12px;
            color: #777;
        }

        pre {
            margin-top: 20px;
            padding: 16px;
            background: #f6f6f6;
            border-radius: 8px;
            overflow-x: auto;
            white-space: pre-wrap;
        }

        .image-viewer {
            display: none;
            margin-top: 20px;
            width: 100%;
            height: 600px;
            border: 1px solid #ddd;
            border-radius: 10px;
            overflow: hidden;
            background: #f9fafb;
            position: relative;
            cursor: grab;
            user-select: none;
        }

        .image-viewer.dragging {
            cursor: grabbing;
        }

        .image-stage {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        .image-stage img {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: top left;
            user-select: none;
            -webkit-user-drag: none;
            -webkit-user-select: none;
            max-width: none;
            border: none;
            margin-top: 0;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>P&ID Diagram Extraction</h1>
        <p>
            Upload an engineering diagram to run symbol detection, OCR, and symbol-text association.
        </p>

        <form id="upload-form">
            <div class="file-upload">
                <label for="image" class="action-btn">
                    <span>⬆</span>
                    <span>Choose Diagram</span>
                </label>
                <input type="file" id="image" name="image" accept="image/*" required />
                <span id="file-name" class="file-name">No file selected</span>
            </div>

            <button type="submit" class="primary-btn">
                <span>Process Diagram</span>
            </button>

            <div id="progress-wrapper" class="progress-wrapper">
                <div class="progress-header">
                    <div class="progress-label">Processing diagram...</div>
                    <div class="progress-status">Running detection, OCR, and matching</div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
                <div class="progress-note">
                    Progress is shown as live activity while the backend processes the request.
                </div>
            </div>
        </form>

        <pre id="result">No results yet.</pre>

        <div id="image-viewer" class="image-viewer">
            <div id="image-stage" class="image-stage">
                <img id="annotated-image" alt="Annotated result" draggable="false" />
            </div>
        </div>

        <div class="button-row">
            <button type="button" id="downloadImgBtn" class="action-btn">Download Annotated Image</button>
            <button type="button" id="downloadExcelBtn" class="action-btn">Download Excel</button>
        </div>
    </div>

    <script>
        let annotatedImageBase64 = null;
        let excelBase64 = null;

        const form = document.getElementById("upload-form");
        const resultBox = document.getElementById("result");
        const annotatedImage = document.getElementById("annotated-image");

        const fileInput = document.getElementById("image");
        const fileNameLabel = document.getElementById("file-name");
        const progressWrapper = document.getElementById("progress-wrapper");

        const downloadImgBtn = document.getElementById("downloadImgBtn");
        const downloadExcelBtn = document.getElementById("downloadExcelBtn");

        const imageViewer = document.getElementById("image-viewer");

        let scale = 1;
        let minScale = 1;
        let maxScale = 6;
        let translateX = 0;
        let translateY = 0;
        let isDragging = false;
        let dragStartX = 0;
        let dragStartY = 0;

        downloadImgBtn.style.display = "none";
        downloadExcelBtn.style.display = "none";

        function clampTranslation() {
            const viewerRect = imageViewer.getBoundingClientRect();
            const viewerWidth = viewerRect.width;
            const viewerHeight = viewerRect.height;

            const scaledWidth = annotatedImage.naturalWidth * scale;
            const scaledHeight = annotatedImage.naturalHeight * scale;

            let minX, maxX, minY, maxY;

            if (scaledWidth <= viewerWidth) {
                minX = maxX = (viewerWidth - scaledWidth) / 2;
            } else {
                minX = viewerWidth - scaledWidth;
                maxX = 0;
            }

            if (scaledHeight <= viewerHeight) {
                minY = maxY = (viewerHeight - scaledHeight) / 2;
            } else {
                minY = viewerHeight - scaledHeight;
                maxY = 0;
            }

            translateX = Math.min(maxX, Math.max(minX, translateX));
            translateY = Math.min(maxY, Math.max(minY, translateY));
        }

        function updateImageTransform() {
            clampTranslation();
            annotatedImage.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        }

        function fitImageToViewer() {
            const viewerRect = imageViewer.getBoundingClientRect();
            const imgWidth = annotatedImage.naturalWidth;
            const imgHeight = annotatedImage.naturalHeight;

            if (!imgWidth || !imgHeight || !viewerRect.width || !viewerRect.height) {
                return;
            }

            const scaleX = viewerRect.width / imgWidth;
            const scaleY = viewerRect.height / imgHeight;
            minScale = Math.min(scaleX, scaleY, 1);

            scale = minScale;

            const renderedWidth = imgWidth * scale;
            const renderedHeight = imgHeight * scale;

            translateX = (viewerRect.width - renderedWidth) / 2;
            translateY = (viewerRect.height - renderedHeight) / 2;

            updateImageTransform();
        }

        function resetImageView() {
            fitImageToViewer();
        }

        fileInput.addEventListener("change", () => {
            fileNameLabel.textContent = fileInput.files.length
                ? fileInput.files[0].name
                : "No file selected";
        });

        annotatedImage.addEventListener("dragstart", (event) => {
            event.preventDefault();
        });

        downloadImgBtn.addEventListener("click", () => {
            if (!annotatedImageBase64) {
                alert("No image to download yet");
                return;
            }

            const link = document.createElement("a");
            link.href = "data:image/jpeg;base64," + annotatedImageBase64;
            link.download = "annotated_image.jpg";
            link.click();
        });

        downloadExcelBtn.addEventListener("click", () => {
            if (!excelBase64) {
                alert("No Excel file to download yet");
                return;
            }

            const link = document.createElement("a");
            link.href = "data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64," + excelBase64;
            link.download = "pid-results.xlsx";
            link.click();
        });

        imageViewer.addEventListener("wheel", (event) => {
            event.preventDefault();

            if (imageViewer.style.display === "none") return;

            const rect = imageViewer.getBoundingClientRect();
            const mouseX = event.clientX - rect.left;
            const mouseY = event.clientY - rect.top;

            const zoomFactor = event.deltaY < 0 ? 1.08 : 0.92;
            const newScale = Math.min(Math.max(minScale, scale * zoomFactor), maxScale);

            if (newScale === scale) return;

            const imageX = (mouseX - translateX) / scale;
            const imageY = (mouseY - translateY) / scale;

            scale = newScale;
            translateX = mouseX - imageX * scale;
            translateY = mouseY - imageY * scale;

            updateImageTransform();
        });

        imageViewer.addEventListener("mousedown", (event) => {
            if (imageViewer.style.display === "none") return;
            if (event.button !== 0) return;

            event.preventDefault();

            isDragging = true;
            imageViewer.classList.add("dragging");
            dragStartX = event.clientX - translateX;
            dragStartY = event.clientY - translateY;
        });

        window.addEventListener("mousemove", (event) => {
            if (!isDragging) return;

            event.preventDefault();

            translateX = event.clientX - dragStartX;
            translateY = event.clientY - dragStartY;
            updateImageTransform();
        });

        window.addEventListener("mouseup", () => {
            isDragging = false;
            imageViewer.classList.remove("dragging");
        });

        imageViewer.addEventListener("dblclick", () => {
            resetImageView();
        });

        annotatedImage.addEventListener("load", () => {
            if (imageViewer.style.display !== "none") {
                fitImageToViewer();
            }
        });

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            if (!fileInput.files.length) {
                resultBox.textContent = "Please choose an image first.";
                progressWrapper.style.display = "none";
                return;
            }

            const formData = new FormData();
            formData.append("image", fileInput.files[0]);

            resultBox.textContent = "Please wait while the diagram is being analyzed...";
            imageViewer.style.display = "none";
            downloadImgBtn.style.display = "none";
            downloadExcelBtn.style.display = "none";
            progressWrapper.style.display = "block";

            try {
                const response = await fetch("/detect", {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`Request failed with status ${response.status}`);
                }

                const data = await response.json();

                progressWrapper.style.display = "none";

                annotatedImageBase64 = data.annotated_image;
                excelBase64 = data.excel_file;

                const objectCount = data.object_detections?.length ?? 0;
                const textCount = data.text_detections?.length ?? 0;
                const matchedCount = data.matched_objects?.length ?? 0;

                const previewMatches = (data.matched_objects || []).slice(0, 10).map((item, index) => {
                    return `${index + 1}. ${item["Predicted Class"]} -> ${item["NearestText"] ?? "None"}`;
                });

                resultBox.textContent =
                    `Objects detected: ${objectCount}\n` +
                    `Text elements detected: ${textCount}\n` +
                    `Matched objects: ${matchedCount}\n\n` +
                    `Showing top 10 matched object-to-text associations:\n${previewMatches.join("\n")}\n\n` +
                    `For full results (objects, matches, text detections, and field descriptions), download the Excel file below.`;

                if (data.annotated_image) {
                    imageViewer.style.display = "block";
                    annotatedImage.src = `data:image/jpeg;base64,${data.annotated_image}`;
                    downloadImgBtn.style.display = "inline-flex";
                }

                if (data.excel_file) {
                    downloadExcelBtn.style.display = "inline-flex";
                }

            } catch (error) {
                resultBox.textContent = "Error: " + error;
                imageViewer.style.display = "none";
                downloadImgBtn.style.display = "none";
                downloadExcelBtn.style.display = "none";
                progressWrapper.style.display = "none";
            }
        });
    </script>
</body>

</html>
